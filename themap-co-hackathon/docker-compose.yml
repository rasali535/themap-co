version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: themap
      POSTGRES_PASSWORD: password
      POSTGRES_DB: themapco
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  app:
    build: .
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://themap:password@db:5432/themapco
    depends_on:
      - db

volumes:
  postgres_data:
