version: '3.8'

services:
  backend:
    image: rasali535/rasalilabs-backend
    build:
      context: .
      dockerfile: Dockerfile.backend
    ports:
      - "9999:9999"
    environment:
      - PORT=9999
      - NODE_ENV=development
      - OLLAMA_API_URL=http://host.docker.internal:11434/api/generate
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - ./server.js:/app/server.js:ro
    restart: unless-stopped
    networks:
      - themap-network

  frontend:
    image: rasali535/rasalilabs-frontend
    build:
      context: .
      dockerfile: Dockerfile.frontend
      args:
        - VITE_LLAMA_SERVER_URL=http://backend:9999/llama
        - VITE_QWEN_API_URL=http://backend:9999/qwen
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=development
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - themap-network

  ollama:
    image: ollama/ollama:0.3.0
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    restart: unless-stopped
    networks:
      - themap-network

  develop:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    environment:
      - NODE_ENV=development
      - VITE_LLAMA_SERVER_URL=http://backend:9999/llama
      - VITE_QWEN_API_URL=http://backend:9999/qwen
    depends_on:
      - backend
    volumes:
      - ./src:/app/src
      - ./index.html:/app/index.html
      - ./package.json:/app/package.json
    command: npm run dev
    restart: unless-stopped
    networks:
      - themap-network

volumes:
  ollama_data:

networks:
  themap-network:
    driver: bridge
